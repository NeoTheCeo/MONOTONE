# African Archive Radio - Upload Platform
services:
  - type: web
    name: african-archive-radio
    region: oregon
    repo: https://github.com/NeoTheCeo/MONOTONE.git
    branch: african-archive-radio-upload
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "3000"
